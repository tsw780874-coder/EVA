version: "3.8"

# EVA 精简部署 — 适用于 4GB 以下内存服务器
# 移除: Milvus/etcd/MinIO (向量搜索) + MCP Server
# 保留: Nginx + Frontend + Backend + MySQL + Redis

services:
  # --- Nginx ---
  nginx:
    image: nginx:alpine
    container_name: eva-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.slim.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - eva-net
    restart: unless-stopped

  # --- Next.js ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eva-frontend
    environment:
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - backend
    networks:
      - eva-net
    restart: unless-stopped

  # --- FastAPI ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eva-backend
    environment:
      - USE_SQLITE=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=eva
      - DB_PASSWORD=${MYSQL_DB_PASSWORD:-eva_secret}
      - DB_NAME=eva
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=mock
      - MILVUS_PORT=19530
      - JWT_SECRET=${JWT_SECRET:-eva-prod-secret}
      - CORS_ORIGINS=["http://39.96.65.233","http://localhost"]
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GLM_FLASH_API_KEY=${GLM_FLASH_API_KEY:-}
      - GLM47_FLASH_API_KEY=${GLM47_FLASH_API_KEY:-}
      - ERNIE_SPEED_API_KEY=${ERNIE_SPEED_API_KEY:-}
      - ERNIE35_API_KEY=${ERNIE35_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - eva-net
    restart: unless-stopped

  # --- MySQL ---
  mysql:
    image: mysql:8.4
    container_name: eva-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: eva
      MYSQL_USER: eva
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD:-eva_secret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eva-net
    restart: unless-stopped

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: eva-redis
    volumes:
      - redis-data:/data
    networks:
      - eva-net
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  eva-net:
    driver: bridge
