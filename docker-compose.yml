# EVA Docker Compose — 4 服务轻量部署 (2C/2G, SQLite)
services:
  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:1.27-alpine
    container_name: eva-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - eva-net
    restart: unless-stopped
    mem_limit: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Next.js 前端 ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eva-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=256
    networks:
      - eva-net
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI 后端 (SQLite) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eva-backend
    expose:
      - "8000"
    env_file:
      - .env.production
    environment:
      - USE_SQLITE=true
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=["http://tsw521.xyz","http://www.tsw521.xyz","http://39.96.65.233"]
      - PIPELINE_MODE=fast
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - eva-net
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 768m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    container_name: eva-redis
    expose:
      - "6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - eva-net
    restart: unless-stopped
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis-data:
    driver: local

networks:
  eva-net:
    driver: bridge
